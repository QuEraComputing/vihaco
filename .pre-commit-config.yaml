repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      # SPDX license headers. `mise exec` makes hawkeye available even when
      # the shell isn't mise-activated; install it with `mise install`.
      - id: license-header
        name: license header (SPDX)
        entry: mise exec -- hawkeye check
        language: system
        types: [rust]
        pass_filenames: false
