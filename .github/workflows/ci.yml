name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--all-targets` excludes doctests; the `doctest` job below covers those.
      # This also compiles the `docs/examples/*.rs` files (via the
      # `vihaco-doctests` crate) and runs the runnable ones.
      - run: cargo test --workspace --all-targets

  doctest:
    name: Doc tests
    runs-on: ubuntu-latest
    # The documentation code lives in `docs/`; the `vihaco-doctests` crate
    # compiles the example files and runs every ```rust block in the guides as
    # a rustdoc doctest. Don't promote warnings to errors here — doctest
    # snippets legitimately contain throwaway bindings.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc
