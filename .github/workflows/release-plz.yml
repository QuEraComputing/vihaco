name: Release-plz

# Automated releases driven by conventional commits.
#
#   • release-plz-pr      opens/updates a "release PR" that bumps the workspace
#                         version and regenerates the changelogs. CI runs on it
#                         (the GitHub App token below can trigger workflows).
#   • release-plz-release on push to main (i.e. when that PR is merged), tags
#                         the release, creates the GitHub Release(s), and
#                         publishes the changed crates to crates.io.
#
# crates.io auth uses OIDC trusted publishing (no stored token) — see the
# `id-token: write` permission on the release job. Configure each crate's
# trusted publisher at https://crates.io/crates/<name>/settings once it exists.

on:
  push:
    branches:
      - main

# No ambient permissions; each job opts into exactly what it needs.
permissions: {}

jobs:
  # Publish any unreleased versions to crates.io and create GitHub Releases.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push tags + create GitHub Releases
      id-token: write   # OIDC: mint a short-lived crates.io token (trusted publishing)
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history is needed to release from the merge commit
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: release-plz/[email protected]
        with:
          command: release
        env:
          # App token (not the default GITHUB_TOKEN) so release events can
          # trigger downstream workflows.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # No CARGO_REGISTRY_TOKEN: release-plz exchanges the OIDC token from
          # `id-token: write` above for a short-lived crates.io token itself.

  # Open/update the release PR (version bump + changelog) for the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Don't cancel an in-flight PR update — let it finish to avoid a half-written PR.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: release-plz/[email protected]
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
