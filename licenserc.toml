headerPath = "licenserc.header.txt"

# Source globs that get the SPDX header. vihaco is a pure-Rust workspace, so
# this is the crate sources; docs and examples are covered by `excludes`.
includes = [
  "crates/**/*.rs",
]

excludes = [
  "**/target/**",
  "**/node_modules/**",
  "**/.venv/**",
  "**/dist/**",
  "**/generated/**",
  "**/*.lock",
  "docs/**",
  "examples/**",
]

useDefaultMapping = true

[properties]
inceptionYear = 2026
copyrightOwner = "The vihaco Authors"
licenseId = "MIT"
